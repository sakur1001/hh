<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疯狂星期四</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1f, #1a0033);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 {
            font-size: 2.6em;
            margin: 20px 0 10px;
            text-shadow: 0 0 15px rgba(255, 80, 80, 0.8);
        }
        p {
            font-size: 1.4em;
            margin: 15px 0;
        }
        .qrcode {
            width: 300px;
            max-width: 85vw;
            margin: 30px 0;
            border: 12px solid #fff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            background: white;
            padding: 15px;
        }
        .tip {
            font-size: 1.25em;
            color: #ffeb3b;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>昨天是疯狂星期四</h1>
    <p>请v我50 😂</p>
    
    <img src="https://ibb.co/tMgqLGHR" 
         alt="收款码" 
         class="qrcode">

    <p class="tip">长按上方二维码识别<br>金额随意，多少都是爱 ❤️</p>
    <p style="font-size: 1em; opacity: 0.8; margin-top: 50px;">（整蛊专用 · 感谢支持）</p>
</body>
</html>
