<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疯狂星期四</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a1f;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 90%;
        }
        h1 {
            font-size: 2.8em;
            margin: 20px 0 10px;
            text-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
        }
        p {
            font-size: 1.4em;
            margin: 15px 0;
            opacity: 0.95;
        }
        .qrcode {
            width: 320px;
            max-width: 85vw;
            margin: 30px auto;
            border: 8px solid #fff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            background: white;
            padding: 10px;
        }
        .tip {
            font-size: 1.1em;
            margin-top: 20px;
            color: #ffcc00;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <h1>昨天是疯狂星期四</h1>
        <p>请v我50 😂</p>
        
        <img src="https://ibb.co/tMgqLGHR" alt="收款码" class="qrcode" onclick="alert('长按图片识别付款哦~')">
        
        <p class="tip">长按上方二维码识别<br>金额随意，多少都是爱 ❤️</p>
        <p style="font-size: 1em; opacity: 0.7; margin-top: 40px;">（整蛊专用 · 感谢支持）</p>
    </div>

    <!-- 粒子特效库 -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00ffff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out"
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
