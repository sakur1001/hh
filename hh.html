<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>疯狂星期四</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 粒子画布容器 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* 不阻挡底层交互 */
        }
        body {
            padding: 20px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a1f, #1a0033);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: clamp(1.8em, 5vw, 2.6em); /* 响应式字号 */
            margin: 15px 0 10px;
            text-shadow: 0 0 12px rgba(255, 80, 80, 0.9), 0 0 20px rgba(255, 120, 120, 0.6);
            letter-spacing: 1px; /* 手机端字间距更舒适 */
        }
        .desc {
            font-size: clamp(1.1em, 3.5vw, 1.4em);
            margin: 10px 0 25px;
            opacity: 0.9;
            line-height: 1.5; /* 行高提升阅读性 */
        }
        /* 二维码容器 - 手机触控友好 */
        .qrcode-wrap {
            width: 100%;
            max-width: 320px; /* 手机端略缩小，更居中 */
            margin: 10px 0 25px;
            position: relative;
        }
        .qrcode {
            width: 100%;
            height: auto;
            border: 8px solid #fff; /* 手机端边框更细，更精致 */
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7), 0 0 30px rgba(255, 80, 80, 0.2);
            background: white;
            padding: 10px;
            transition: transform 0.2s ease; /* 轻触缩放效果 */
        }
        .qrcode:active {
            transform: scale(0.98); /* 触控反馈 */
        }
        .tip {
            font-size: clamp(1em, 3vw, 1.25em);
            color: #ffeb3b;
            margin: 15px 0 30px;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(255, 235, 59, 0.5);
        }
        .footer {
            font-size: clamp(0.85em, 2vw, 1em);
            opacity: 0.7;
            margin-top: auto; /* 底部固定 */
            padding: 15px 0;
        }
    </style>
</head>
<body>
    <!-- 粒子画布 -->
    <canvas id="particleCanvas"></canvas>
    
    <h1>明天是疯狂星期四</h1>
    <p class="desc">请v我50 </p>
    
    <div class="qrcode-wrap">
        <img src="https://i.ibb.co/XxDWdCKc/100.png" 
            alt="收款码" 
            class="qrcode">
    </div>

    <p class="tip">长按上方二维码识别<br></p>
    <p class="footer"></p>

    <script>
        // 星光粒子特效 - 适配手机性能
        class ParticleEffect {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.maxParticles = window.innerWidth < 768 ? 80 : 120; // 手机端减少粒子数量
                this.mouse = { x: null, y: null, radius: 150 }; // 交互半径
                
                this.resizeCanvas();
                this.initParticles();
                this.animate();
                
                // 监听窗口大小变化
                window.addEventListener('resize', () => this.resizeCanvas());
                // 手机端触摸/桌面端鼠标交互
                window.addEventListener('mousemove', (e) => this.updateMousePos(e));
                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    this.updateMousePos(e.touches[0]);
                }, { passive: false });
                window.addEventListener('touchend', () => {
                    this.mouse.x = null;
                    this.mouse.y = null;
                });
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            initParticles() {
                this.particles = [];
                for (let i = 0; i < this.maxParticles; i++) {
                    const size = Math.random() * 1.2 + 0.3; // 粒子大小（手机端更小）
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: size,
                        speedX: Math.random() * 0.5 - 0.25, // 速度放缓，降低功耗
                        speedY: Math.random() * 0.5 - 0.25,
                        color: `rgba(${255 - Math.random() * 80}, ${Math.random() * 100}, ${255 - Math.random() * 80}, ${Math.random() * 0.8 + 0.2})`
                    });
                }
            }

            updateMousePos(e) {
                this.mouse.x = e.clientX || e.pageX;
                this.mouse.y = e.clientY || e.pageY;
            }

            drawParticles() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (let i = 0; i < this.particles.length; i++) {
                    const p = this.particles[i];
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.fill();
                    
                    // 粒子运动
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    // 边界回弹
                    if (p.x < 0 || p.x > this.canvas.width) p.speedX = -p.speedX;
                    if (p.y < 0 || p.y > this.canvas.height) p.speedY = -p.speedY;
                    
                    // 鼠标/触摸交互
                    if (this.mouse.x && this.mouse.y) {
                        const dx = this.mouse.x - p.x;
                        const dy = this.mouse.y - p.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const maxDistance = this.mouse.radius;
                        const force = (maxDistance - distance) / maxDistance;
                        
                        if (distance < maxDistance) {
                            p.x -= forceDirectionX * force * 0.8; // 交互力度适配手机
                            p.y -= forceDirectionY * force * 0.8;
                        }
                    }
                }
            }

            animate() {
                this.drawParticles();
                requestAnimationFrame(() => this.animate());
            }
        }

        // 初始化粒子特效（确保DOM加载完成）
        window.addEventListener('DOMContentLoaded', () => {
            new ParticleEffect();
        });
    </script>
</body>
</html>
